name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp service worker version
        env:
          SW_VERSION: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          sw_version = os.environ.get('SW_VERSION')
          if not sw_version:
              raise SystemExit('SW_VERSION not set')

          sw_path = Path('composeApp/src/webMain/resources/sw.js')
          text = sw_path.read_text(encoding='utf-8')

          import re
          new_text, n = re.subn(r"^const VERSION = '.*';$", f"const VERSION = '{sw_version}';", text, flags=re.M)
          if n != 1:
              raise SystemExit(f'Expected to replace 1 VERSION line, replaced {n}')

          sw_path.write_text(new_text, encoding='utf-8')
          print(f'Stamped {sw_path} VERSION={sw_version}')
          PY

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build (Wasm)
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --console=plain

      - name: Prepare Pages artifact
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')
        run: |
          touch composeApp/build/dist/wasmJs/productionExecutable/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: actions/upload-pages-artifact@v3
        with:
          path: composeApp/build/dist/wasmJs/productionExecutable

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: actions/deploy-pages@v4
