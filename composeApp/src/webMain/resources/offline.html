<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b2e1e">
    <title>FreeCell (Offline)</title>
    <style>
        :root {
            --bg1: #071f15;
            --bg2: #0b2e1e;
            --card: rgba(255, 255, 255, 0.08);
            --text: rgba(255, 255, 255, 0.92);
            --muted: rgba(255, 255, 255, 0.7);
            --line: rgba(255, 255, 255, 0.18);
        }
        html, body {
            height: 100%;
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 600px at 20% 10%, rgba(255, 255, 255, 0.08), transparent 60%),
                radial-gradient(900px 500px at 80% 30%, rgba(255, 255, 255, 0.06), transparent 55%),
                linear-gradient(180deg, var(--bg1), var(--bg2));
        }
        .wrap {
            min-height: 100%;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .card {
            width: min(520px, 92vw);
            border: 1px solid var(--line);
            background: var(--card);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 20px 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 22px;
            letter-spacing: 0.2px;
        }
        p {
            margin: 0 0 16px;
            color: var(--muted);
            line-height: 1.4;
        }
        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            appearance: none;
            border: 1px solid var(--line);
            background: rgba(0, 0, 0, 0.15);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        button:active {
            transform: translateY(1px);
        }
        .hint {
            margin-top: 14px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <h1>You're offline</h1>
        <p>FreeCell can still work offline once it's been loaded at least once while connected.</p>
        <div class="row">
            <button onclick="location.href='./'">Try opening FreeCell</button>
            <button onclick="location.reload()">Retry</button>
        </div>
        <div class="hint">Tip: When you're back online, the app will pick up new releases automatically.</div>
    </div>
</div>
</body>
</html>
