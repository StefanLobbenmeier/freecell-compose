<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeCell</title>

    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#0b2e1e">
    <meta name="application-name" content="FreeCell">
    <meta name="mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FreeCell">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
    <link type="text/css" rel="stylesheet" href="styles.css">
</head>
<body style="text-align: center; align-content: center">
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50" role="presentation">
    <circle cx="25" cy="25" r="20" stroke="#ccc" stroke-width="4" fill="none"/>
    <circle cx="25" cy="25" r="20" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"
            stroke-dasharray="90 125">
        <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                          repeatCount="indefinite"/>
    </circle>
</svg>
<script type="application/javascript" src="composeApp.js"></script>

<script>
    (function () {
        if (!('serviceWorker' in navigator)) return;

        var host = location.hostname;
        var isLocal = host === 'localhost' || host === '127.0.0.1' || host === '[::1]';
        if (isLocal) return;

        function promptToRefresh(reg) {
            if (!reg || !reg.waiting) return;
            var ok = confirm('A new version of FreeCell is available. Reload now?');
            if (ok) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }

        navigator.serviceWorker.register('sw.js', { scope: './' }).then(function (reg) {
            promptToRefresh(reg);

            reg.addEventListener('updatefound', function () {
                var sw = reg.installing;
                if (!sw) return;
                sw.addEventListener('statechange', function () {
                    if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                        promptToRefresh(reg);
                    }
                });
            });

            document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'visible') reg.update();
            });
        });

        navigator.serviceWorker.addEventListener('controllerchange', function () {
            location.reload();
        });

        // If the app is stuck on a broken SW cache (e.g. a partial upgrade where a
        // required .wasm is missing), self-heal by unregistering SW + clearing caches.
        // This is a last resort and only triggers after repeated load failures.
        var BOOT_FAIL_KEY = 'freecell_boot_fail_count';
        var MAX_FAILS_BEFORE_RESET = 2;

        function getFailCount() {
            try { return Number(localStorage.getItem(BOOT_FAIL_KEY) || '0') || 0; } catch (_) { return 0; }
        }

        function setFailCount(n) {
            try { localStorage.setItem(BOOT_FAIL_KEY, String(n)); } catch (_) {}
        }

        function looksLikeMissingCriticalAsset(reason) {
            var msg = '';
            try {
                msg = String((reason && (reason.message || reason)) || '');
            } catch (_) {
                msg = '';
            }
            msg = msg.toLowerCase();
            return msg.indexOf('wasm') >= 0 || msg.indexOf('webassembly') >= 0 || msg.indexOf('compile') >= 0 || msg.indexOf('instantiate') >= 0 || msg.indexOf('404') >= 0;
        }

        async function nukeServiceWorkerAndCaches() {
            try {
                var regs = await navigator.serviceWorker.getRegistrations();
                await Promise.all(regs.map(function (r) { return r.unregister(); }));
            } catch (_) {}
            try {
                if (!('caches' in window)) return;
                var keys = await caches.keys();
                await Promise.all(keys.map(function (k) { return caches.delete(k); }));
            } catch (_) {}
        }

        window.addEventListener('unhandledrejection', function (e) {
            if (!e || !looksLikeMissingCriticalAsset(e.reason)) return;
            var fails = getFailCount() + 1;
            setFailCount(fails);

            if (fails < MAX_FAILS_BEFORE_RESET) {
                location.reload();
                return;
            }

            nukeServiceWorkerAndCaches().then(function () {
                setFailCount(0);
                location.replace(location.href);
            });
        });

        window.addEventListener('error', function (e) {
            if (!e || !looksLikeMissingCriticalAsset(e.error || e.message)) return;
            var fails = getFailCount() + 1;
            setFailCount(fails);

            if (fails < MAX_FAILS_BEFORE_RESET) {
                location.reload();
                return;
            }

            nukeServiceWorkerAndCaches().then(function () {
                setFailCount(0);
                location.replace(location.href);
            });
        });
    })();
</script>
</body>
</html>
